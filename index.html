<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>对外汉语教学互动卡片</title>
<style>
  body { 
    display: flex; justify-content: center; align-items: center; 
    height: 100vh; margin: 0; background-color: #FDF6E3; 
    font-family: "Microsoft JhengHei", sans-serif; user-select: none;
    transition: background 0.5s;
  }
  #container { display: flex; align-items: center; gap: 20px; }
  #card { 
    width: 60vw; height: 60vh; background: white; 
    border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
    display: flex; flex-direction: column; justify-content: center; align-items: center; 
    text-align: center; padding: 40px; border: 8px dashed #FFD166; cursor: pointer;
  }
  #main-text { font-size: 8vw; font-weight: bold; color: #264653; margin-bottom: 20px; }
  #sub-text { font-size: 4vw; color: #E76F51; margin-top: 20px; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  button { 
    padding: 15px 20px; font-size: 18px; cursor: pointer; 
    border: none; border-radius: 15px; background: #FFD166; color: white;
    font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.1); width: 140px;
  }
  button:hover { background: #E76F51; }
  .hint { position: absolute; bottom: 30px; font-size: 24px; color: #888; }
</style>
</head>
<body>

  <div id="container">
    <div class="btn-group">
      <button onclick="changeCard(-1)">上一页</button>
      <button id="mode-btn" onclick="toggleMode()">模式：顺序</button>
    </div>
    
    <div id="card" onclick="nextStep()">
      <div id="main-text"></div>
      <div id="sub-text"></div>
    </div>
    
    <button onclick="changeCard(1)">下一页</button>
  </div>
  
  <div class="hint">👉 點擊中間卡片進行步驟翻轉 👈</div>

  <script>
    const originalCards = [
      {h: "你", p: "nǐ", e: "you"}, {h: "好", p: "hǎo", e: "good / fine"}, {h: "叫", p: "jiào", e: "to call"},
      {h: "名字", p: "míngzi", e: "name"}, {h: "什么", p: "shénme", e: "what"}, {h: "同学", p: "classmate"},
      {h: "你好！", p: "Nǐ hǎo!", e: "Hello!"}, {h: "你叫什么名字？", p: "Nǐ jiào shénme míngzi?", e: "What is your name?"},
      {h: "你是哪国人？", p: "Nǐ shì nǎ guó rén?", e: "What is your nationality?"},
      {h: "他是我的同学。", p: "Tā shì wǒ de tóngxué.", e: "He is my classmate."}
    ];

    let flashcards = [...originalCards];
    let currentIndex = 0;
    let step = 0; 
    let isRandom = false;

    function toggleMode() {
      isRandom = !isRandom;
      const btn = document.getElementById('mode-btn');
      
      if (isRandom) {
        btn.innerHTML = "模式：随机";
        // 执行洗牌
        for (let i = flashcards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
        }
      } else {
        btn.innerHTML = "模式：顺序";
        // 恢复原样
        flashcards = [...originalCards];
      }
      
      currentIndex = 0;
      step = 0;
      updateDisplay();
    }

    function updateDisplay() {
      const mainEl = document.getElementById('main-text');
      const subEl = document.getElementById('sub-text');
      document.querySelector('.hint').style.display = 'none';

      if (step === 0) {
        mainEl.innerHTML = "";
        subEl.innerHTML = "";
      } else if (step === 1) {
        mainEl.innerHTML = flashcards[currentIndex].h;
        subEl.innerHTML = "";
      } else if (step === 2) {
        mainEl.innerHTML = flashcards[currentIndex].h;
        subEl.innerHTML = flashcards[currentIndex].p;
      } else if (step === 3) {
        mainEl.innerHTML = flashcards[currentIndex].h;
        subEl.innerHTML = flashcards[currentIndex].p + " <br> " + flashcards[currentIndex].e;
      }
    }

    function nextStep() {
      step++;
      if (step > 3) {
        step = 1;
        currentIndex = (currentIndex + 1) % flashcards.length;
        document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 50%, 90%)`;
      }
      updateDisplay();
    }

    function changeCard(direction) {
      currentIndex = (currentIndex + direction + flashcards.length) % flashcards.length;
      step = 1;
      updateDisplay();
    }
  </script>
</body>
</html>
