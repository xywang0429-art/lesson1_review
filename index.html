<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chinese Teaching Flashcards</title>
<style>
  body { 
    display: flex; justify-content: center; align-items: center; 
    height: 100vh; margin: 0; background-color: #FDF6E3; 
    font-family: "Segoe UI", sans-serif; user-select: none;
    transition: background 0.5s;
  }
  #container { display: flex; align-items: center; gap: 20px; }
  #card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #card { 
    width: 60vw; height: 60vh; background: white; 
    border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
    display: flex; flex-direction: column; justify-content: center; align-items: center; 
    text-align: center; padding: 40px; border: 8px dashed #FFD166; cursor: pointer;
    outline: none;
  }
  
  #main-text { font-size: 8vw; font-weight: bold; color: #264653; margin-bottom: 10px; }
  #sub-text { font-size: 2.5vw; color: #E76F51; margin-top: 10px; line-height: 1.4; }
  
  #progress-bar { font-size: 18px; color: #555; font-weight: bold; }
  
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  button, select { 
    padding: 12px 18px; font-size: 15px; cursor: pointer; 
    border: none; border-radius: 12px; background: #FFD166; color: white;
    font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 130px;
  }
  button:hover { background: #E76F51; }
  .hint { position: absolute; bottom: 30px; font-size: 20px; color: #888; }
</style>
</head>
<body>

  <div id="container">
    <div class="btn-group">
      <select id="lesson-select" onchange="switchLesson()">
        <option value="lesson1">Lesson 1</option>
        <option value="lesson2">Lesson 2</option>
        <option value="lesson3">Lesson 3</option>
        <option value="lesson4">Lesson 4</option>
        <option value="lesson5">Lesson 5</option>
        <option value="lesson6">Lesson 6</option>
        <option value="lesson7">Lesson 7</option>
        <option value="lesson8">Lesson 8</option>
        <option value="lesson9">Lesson 9</option>
        <option value="lesson10">Lesson 10</option>
        <option value="lesson11">Lesson 11</option>
        <option value="lesson12">Lesson 12</option>
      </select>
      <button onclick="changeCard(-1)">Previous</button>
      <button id="mode-btn" onclick="toggleMode()">Mode: Order</button>
      <button onclick="changeCard(1)">Next</button>
    </div>
    
    <div id="card-wrapper">
      <div id="card" tabindex="0" onclick="nextStep()">
        <div id="main-text"></div>
        <div id="sub-text"></div>
      </div>
      <div id="progress-bar">Progress: 0 / 0</div>
    </div>
  </div>
  
  <div class="hint">👉 Space: Next Step | Up/Down: Change Card 👈</div>

    let flashcards = [];
    let originalCards = [];
    let currentIndex = 0;
    let step = 0; 
    let isRandom = false;

    function switchLesson() {
      const lesson = document.getElementById('lesson-select').value;
      originalCards = [...allData[lesson]];
      flashcards = [...originalCards];
      currentIndex = 0;
      step = 0;
      isRandom = false;
      document.getElementById('mode-btn').innerHTML = "Mode: Order";
      updateDisplay();
    }

    function toggleMode() {
      isRandom = !isRandom;
      const btn = document.getElementById('mode-btn');
      if (isRandom) {
        btn.innerHTML = "Mode: Random";
        for (let i = flashcards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
        }
      } else {
        btn.innerHTML = "Mode: Order";
        flashcards = [...originalCards];
      }
      currentIndex = 0;
      step = 0;
      updateDisplay();
    }

    function updateDisplay() {
      const mainEl = document.getElementById('main-text');
      const subEl = document.getElementById('sub-text');
      const progressEl = document.getElementById('progress-bar');
      
      if (step === 0) {
        const lessonName = document.getElementById('lesson-select').options[document.getElementById('lesson-select').selectedIndex].text;
        mainEl.innerHTML = lessonName; subEl.innerHTML = "";
        progressEl.innerHTML = `Cards: ${flashcards.length}`;
      } else {
        mainEl.innerHTML = flashcards[currentIndex].h;
        progressEl.innerHTML = `Progress: ${currentIndex + 1} / ${flashcards.length}`;
        
        if (step === 1) subEl.innerHTML = "";
        else if (step === 2) subEl.innerHTML = flashcards[currentIndex].p;
        else if (step === 3) subEl.innerHTML = flashcards[currentIndex].p + " <br> " + flashcards[currentIndex].e;
      }
    }

    function nextStep() {
      step++;
      if (step > 3) {
        step = 1;
        currentIndex = (currentIndex + 1) % flashcards.length;
        document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 50%, 90%)`;
      }
      updateDisplay();
    }

    function changeCard(direction) {
      currentIndex = (currentIndex + direction + flashcards.length) % flashcards.length;
      step = 1;
      updateDisplay();
    }

    switchLesson();
  </script>
